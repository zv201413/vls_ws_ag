name: Release VLESS-TS Script

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Prepare Release Files
        run: |
          mkdir -p release
          cp vless-ts.sh release/
          cp install.sh release/
          chmod +x release/*.sh
          
          # 生成版本信息
          VERSION=${GITHUB_REF_NAME:-v1.0.0}
          echo "VERSION: $VERSION" > release/VERSION
          echo "DATE: $(date '+%Y-%m-%d %H:%M:%S UTC')" >> release/VERSION
          
      - name: Upload to Release
        uses: softprops/action-gh-release@v1
        if: startsWith(github.ref, 'refs/tags/')
